<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <meta name="author" content="Jennifer Liang" />
    <title>{% if page.title %}{{ page.title }} - {% endif %}Jennifer Liang</title>
    <link rel="icon" type="image/x-icon" href="/assets/img/favicon.ico" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="/css/markdown-style.css" rel="stylesheet" />
</head>

<body>
    <div class="container">
        <header>
            <h1>Jennifer Liang</h1>
            <p class="subtitle">Software Engineer</p>
            <nav>
                <a href="/index.html#about"{% if page.nav == "about" %} class="active"{% endif %}>About</a>
                <a href="/projects.html"{% if page.nav == "projects" %} class="active"{% endif %}>Projects</a>
                <a href="/misc.html"{% if page.nav == "misc" %} class="active"{% endif %}>Misc</a>
                <a href="/assets/Jennifer_Liang.pdf" target="_blank">Resume ↗</a>
            </nav>
        </header>

        <main>
{{ content }}
        </main>

        <footer>
            <p>&copy; 2026 Jennifer Liang{% unless page.url == "/" %} • <a href="/">Back to Home</a>{% endunless %}</p>
        </footer>
    </div>
</body>
</html>
